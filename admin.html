<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetica | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { offwhite: '#f9f9f9', dark: '#121212', muted: '#888888' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; color: #121212; }
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #fff; }
        ::-webkit-scrollbar-thumb { background: #ddd; }
    </style>
</head>
<body class="antialiased" x-data="adminPanel()">

    <!--
        SECURITY NOTE — read before deploying this file anywhere public:
        The passphrase gate below is a screen lock, not real authentication.
        The "real" admin data (every order, every customer's name/phone/address,
        every payment screenshot) is sitting in a Firebase Realtime Database that
        this file talks to with plain unauthenticated fetch() calls. If that
        database's rules allow public read/write (the default for a quick
        Firebase setup, and what this codebase's pattern suggests), then:
          1. Anyone who finds your dbUrl can read/write orders directly via curl,
             with or without this admin.html page existing at all.
          2. This passphrase only stops casual browsing of THIS page — it does
             nothing to protect the underlying data.
        To make this genuinely secure you need Firebase Auth + security rules
        that check auth on the /orders path, or a real backend in front of the
        database. Treat this file as "convenience UI for the person who already
        has the only link," not as a security boundary.
    -->

    <div x-show="!unlocked" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-sm w-full text-center">
            <h1 class="font-serif text-3xl mb-2">Aesthetica.</h1>
            <p class="text-muted text-sm mb-8 uppercase tracking-widest">Admin Access</p>
            <form @submit.prevent="tryUnlock">
                <input type="password" x-model="passInput" placeholder="Passphrase" class="w-full border-b border-gray-300 py-3 text-center focus:outline-none focus:border-dark transition-colors mb-2 bg-transparent" autofocus>
                <p x-show="unlockError" x-cloak class="text-red-600 text-xs mb-4">Incorrect passphrase.</p>
                <button type="submit" class="w-full bg-dark text-white py-4 text-sm tracking-widest uppercase font-medium hover:bg-black transition-colors mt-6">Enter</button>
            </form>
            <p class="text-xs text-muted mt-8">This is a screen lock, not a security boundary. See code comments.</p>
        </div>
    </div>

    <div x-show="unlocked" x-cloak>
        <header class="border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur-md z-20">
            <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
                <h1 class="font-serif text-2xl">Aesthetica. <span class="text-muted text-sm font-sans">Admin</span></h1>
                <button @click="fetchOrders()" class="text-xs uppercase tracking-widest border-b border-dark pb-0.5 hover:text-muted">
                    <span x-text="loadingOrders ? 'Refreshing…' : 'Refresh'"></span>
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 py-10">

            <div class="flex flex-wrap gap-2 mb-8">
                <template x-for="f in filters" :key="f">
                    <button
                        @click="activeFilter = f"
                        class="text-xs uppercase tracking-widest px-4 py-2 border transition-colors"
                        :class="activeFilter === f ? 'bg-dark text-white border-dark' : 'border-gray-300 text-muted hover:border-dark hover:text-dark'"
                        x-text="f + (f !== 'All' ? ' (' + countFor(f) + ')' : ' (' + orderList.length + ')')">
                    </button>
                </template>
            </div>

            <div x-show="loadingOrders" class="text-center text-muted py-20 font-serif">Loading orders…</div>
            <div x-show="loadError" x-cloak class="text-center py-20">
                <p class="font-serif text-xl mb-3">Couldn't load orders.</p>
                <button @click="fetchOrders()" class="border border-dark px-6 py-3 text-xs uppercase tracking-widest hover:bg-gray-50">Retry</button>
            </div>

            <div x-show="!loadingOrders && !loadError && filteredOrders.length === 0" x-cloak class="text-center text-muted py-20 font-serif text-lg">
                No orders in this view.
            </div>

            <div x-show="!loadingOrders && !loadError" class="space-y-3">
                <template x-for="order in filteredOrders" :key="order.orderId">
                    <button @click="selected = order" class="w-full text-left border border-gray-200 rounded-lg p-5 flex justify-between items-center hover:border-dark transition-colors">
                        <div>
                            <p class="font-mono text-sm font-medium" x-text="order.orderId"></p>
                            <p class="text-sm text-muted mt-1" x-text="order.customer?.fullName || '—'"></p>
                            <p class="text-xs text-muted mt-1" x-text="formatDate(order.timestamp)"></p>
                        </div>
                        <div class="text-right">
                            <p class="font-serif text-lg mb-1" x-text="'₹' + order.totalPaid"></p>
                            <span class="inline-block text-[10px] uppercase tracking-widest px-3 py-1" :class="statusClass(order.status)" x-text="order.status"></span>
                        </div>
                    </button>
                </template>
            </div>
        </main>

        <!-- Order detail / review modal -->
        <div x-show="selected" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" x-transition.opacity>
            <div class="absolute inset-0 bg-dark/40 backdrop-blur-sm" @click="selected = null"></div>
            <div class="relative bg-white w-full max-w-3xl max-h-[90vh] overflow-y-auto rounded-lg shadow-2xl" @click.stop x-show="selected">
                <template x-if="selected">
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="font-mono text-lg font-medium" x-text="selected.orderId"></p>
                                <p class="text-xs text-muted mt-1" x-text="formatDate(selected.timestamp)"></p>
                            </div>
                            <button @click="selected = null" class="text-muted hover:text-dark">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>

                        <span class="inline-block text-[10px] uppercase tracking-widest px-3 py-1 mb-6" :class="statusClass(selected.status)" x-text="selected.status"></span>

                        <div class="grid md:grid-cols-2 gap-8 mb-8">
                            <div>
                                <h4 class="text-xs uppercase tracking-widest text-muted mb-3">Customer</h4>
                                <p class="text-sm font-medium" x-text="selected.customer?.fullName"></p>
                                <p class="text-sm text-muted" x-text="selected.customer?.phone"></p>
                                <p class="text-sm text-muted mt-2" x-text="[selected.customer?.houseNo, selected.customer?.street].filter(Boolean).join(', ')"></p>
                                <p class="text-sm text-muted" x-text="[selected.customer?.district, selected.customer?.state, selected.customer?.pincode].filter(Boolean).join(', ')"></p>
                            </div>
                            <div>
                                <h4 class="text-xs uppercase tracking-widest text-muted mb-3">Items</h4>
                                <div class="space-y-1">
                                    <template x-for="(item, i) in (selected.cart || [])" :key="i">
                                        <div class="flex justify-between text-sm">
                                            <span x-text="item.package + 'x ' + item.name"></span>
                                            <span class="font-medium" x-text="'₹' + item.pricePaid"></span>
                                        </div>
                                    </template>
                                </div>
                                <div class="flex justify-between text-sm font-medium border-t border-gray-200 mt-3 pt-3">
                                    <span>Total</span>
                                    <span x-text="'₹' + selected.totalPaid"></span>
                                </div>
                            </div>
                        </div>

                        <div class="mb-8">
                            <h4 class="text-xs uppercase tracking-widest text-muted mb-3">Payment Proof</h4>
                            <template x-if="selected.paymentProof">
                                <img :src="selected.paymentProof" class="max-h-96 rounded border border-gray-200 cursor-zoom-in" @click="zoomImage = selected.paymentProof">
                            </template>
                            <template x-if="!selected.paymentProof">
                                <p class="text-sm text-muted italic">No proof attached to this order.</p>
                            </template>
                        </div>

                        <div x-show="selected.verifiedAt" x-cloak class="text-xs text-muted mb-6">
                            Reviewed <span x-text="formatDate(selected.verifiedAt)"></span>
                        </div>

                        <div class="flex flex-wrap gap-3">
                            <button @click="setStatus(selected, 'Confirmed')" :disabled="updating" class="flex-1 min-w-[120px] bg-dark text-white py-3 text-xs uppercase tracking-widest hover:bg-black disabled:opacity-40">Approve</button>
                            <button @click="setStatus(selected, 'Rejected')" :disabled="updating" class="flex-1 min-w-[120px] border border-red-600 text-red-600 py-3 text-xs uppercase tracking-widest hover:bg-red-50 disabled:opacity-40">Reject</button>
                            <button @click="setStatus(selected, 'Shipped')" :disabled="updating || selected.status !== 'Confirmed'" class="flex-1 min-w-[120px] border border-dark text-dark py-3 text-xs uppercase tracking-widest hover:bg-gray-50 disabled:opacity-40">Mark Shipped</button>
                        </div>
                        <p class="text-xs text-muted mt-3" x-show="selected.status !== 'Confirmed'" x-cloak>Approve before marking as shipped.</p>
                    </div>
                </template>
            </div>
        </div>

        <!-- Fullscreen proof zoom -->
        <div x-show="zoomImage" x-cloak class="fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-6" @click="zoomImage = null" x-transition.opacity>
            <img :src="zoomImage" class="max-h-full max-w-full object-contain">
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('adminPanel', () => ({
                dbUrl: 'https://dedrop-store-default-rtdb.firebaseio.com',

                // NOT real auth — see comment at top of <body>. This only blocks
                // casual access to this HTML page in a browser tab.
                unlocked: false,
                passInput: '',
                unlockError: false,
                ADMIN_PASS: 'aesthetica-admin', // change this before using

                orderList: [],
                loadingOrders: false,
                loadError: false,
                updating: false,

                filters: ['All', 'Pending Verification', 'Confirmed', 'Shipped', 'Rejected'],
                activeFilter: 'Pending Verification',

                selected: null,
                zoomImage: null,

                tryUnlock() {
                    if (this.passInput === this.ADMIN_PASS) {
                        this.unlocked = true;
                        this.unlockError = false;
                        this.fetchOrders();
                    } else {
                        this.unlockError = true;
                    }
                },

                async fetchOrders() {
                    this.loadingOrders = true;
                    this.loadError = false;
                    try {
                        const res = await fetch(`${this.dbUrl}/orders.json`);
                        if (!res.ok) throw new Error('Bad response');
                        const data = await res.json();
                        const list = Object.values(data || {});
                        // Newest first
                        list.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        this.orderList = list;
                    } catch (e) {
                        console.error('Failed to load orders', e);
                        this.loadError = true;
                    } finally {
                        this.loadingOrders = false;
                    }
                },

                get filteredOrders() {
                    if (this.activeFilter === 'All') return this.orderList;
                    return this.orderList.filter(o => (o.status || 'Pending Verification') === this.activeFilter);
                },

                countFor(status) {
                    return this.orderList.filter(o => (o.status || 'Pending Verification') === status).length;
                },

                async setStatus(order, status) {
                    this.updating = true;
                    try {
                        const res = await fetch(`${this.dbUrl}/orders/${order.orderId}.json`, {
                            method: 'PATCH',
                            body: JSON.stringify({
                                status: status,
                                verifiedAt: new Date().toISOString(),
                                verifiedBy: 'admin' // replace with a real identifier if you add multi-admin auth later
                            })
                        });
                        if (!res.ok) throw new Error('Update failed');
                        order.status = status;
                        order.verifiedAt = new Date().toISOString();
                        this.selected = { ...order };
                    } catch (e) {
                        alert('Could not update order status. Check your connection and try again.');
                    } finally {
                        this.updating = false;
                    }
                },

                statusClass(status) {
                    if (status === 'Confirmed') return 'bg-dark text-white';
                    if (status === 'Shipped') return 'bg-green-700 text-white';
                    if (status === 'Rejected') return 'bg-red-600 text-white';
                    return 'bg-gray-300 text-dark'; // Pending Verification
                },

                formatDate(iso) {
                    if (!iso) return '—';
                    try {
                        return new Date(iso).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
                    } catch (e) {
                        return iso;
                    }
                }
            }));
        });
    </script>
</body>
</html>
